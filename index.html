<!DOCTYPE html>
<html lang="hi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>⚡ Lightning Hands — Pro</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Rajdhani:wght@400;600;700&family=Orbitron:wght@400;700;900&display=swap');
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
:root{--neon:#00aaff;--bg:#020208;--surf:#08080f;--bdr:rgba(0,170,255,0.18);}
html,body{width:100%;height:100%;overflow:hidden;}
body{background:var(--bg);color:#fff;font-family:'Rajdhani',sans-serif;display:flex;flex-direction:column;align-items:center;justify-content:center;}

/* Animated background grid */
#bgCanvas{position:fixed;inset:0;z-index:0;opacity:.35;}

.app{position:relative;z-index:1;width:100%;max-width:760px;padding:10px 12px;display:flex;flex-direction:column;align-items:center;gap:10px;}

h1{font-family:'Orbitron',monospace;font-size:clamp(1.1rem,3.5vw,1.8rem);font-weight:900;letter-spacing:.1em;text-align:center;
  background:linear-gradient(90deg,#00aaff,#aa00ff,#ffaa00,#00aaff);background-size:300%;
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;animation:shimmer 4s linear infinite;}
@keyframes shimmer{to{background-position:300% center;}}

/* Camera */
.cam-wrap{position:relative;width:100%;aspect-ratio:16/9;background:#000;border-radius:14px;overflow:hidden;
  border:1px solid var(--bdr);transition:box-shadow .3s;}
.cam-wrap.orb-glow{box-shadow:0 0 70px rgba(0,200,255,.5),0 0 140px rgba(0,100,255,.2);}
.cam-wrap.throw-glow{box-shadow:0 0 100px rgba(255,180,0,.6);}
.cam-wrap.hit-glow{box-shadow:0 0 120px rgba(255,50,0,.8);}
.cam-wrap.shield-glow{box-shadow:0 0 80px rgba(0,255,200,.5);}
.cam-wrap.shake{animation:shake .3s ease-out;}
@keyframes shake{0%{transform:translate(0,0)}20%{transform:translate(-7px,5px)}40%{transform:translate(7px,-5px)}60%{transform:translate(-5px,3px)}80%{transform:translate(5px,-3px)}100%{transform:translate(0,0)}}

#webcam{width:100%;height:100%;object-fit:cover;transform:scaleX(-1);display:block;}
#overlay{position:absolute;inset:0;width:100%;height:100%;pointer-events:none;}

/* HUD */
#hud{position:absolute;inset:0;pointer-events:none;font-family:'Orbitron',monospace;}
.hud-tl,.hud-tr,.hud-bl,.hud-br{position:absolute;display:flex;flex-direction:column;gap:5px;}
.hud-tl{top:10px;left:12px;}
.hud-tr{top:10px;right:12px;align-items:flex-end;}
.hud-bl{bottom:14px;left:12px;}
.hud-br{bottom:14px;right:12px;align-items:flex-end;}
.hud-pill{font-size:.62rem;letter-spacing:.07em;background:rgba(0,0,0,.6);border:1px solid rgba(0,170,255,.22);
  border-radius:6px;padding:4px 9px;color:rgba(0,210,255,.9);backdrop-filter:blur(6px);white-space:nowrap;}
.hud-pill.warn{border-color:rgba(255,80,0,.4);color:rgba(255,180,0,.95);}
.hud-pill.good{border-color:rgba(0,255,150,.3);color:rgba(0,255,180,.9);}

/* Score popup */
.score-pop{position:absolute;font-family:'Orbitron',monospace;font-weight:700;pointer-events:none;
  animation:popUp .9s ease-out forwards;}
@keyframes popUp{0%{opacity:1;transform:translateY(0) scale(1);}100%{opacity:0;transform:translateY(-60px) scale(1.4);}}

/* Mode banner */
#modeBanner{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);
  font-family:'Orbitron',monospace;font-weight:900;font-size:clamp(1.2rem,5vw,2.5rem);
  letter-spacing:.12em;text-align:center;pointer-events:none;opacity:0;text-shadow:0 0 30px currentColor;
  transition:opacity .3s;}

/* Off screen */
.cam-off{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:10px;
  color:rgba(255,255,255,.3);font-family:'Orbitron',monospace;font-size:.8rem;letter-spacing:.1em;}
.cam-icon{font-size:3rem;opacity:.2;}
#loadBar{position:absolute;bottom:0;left:0;height:3px;background:linear-gradient(90deg,#00aaff,#aa00ff);width:0%;transition:width .3s;border-radius:0 0 0 14px;}

/* Charge ring */
#chargeRing{position:absolute;bottom:16px;left:50%;transform:translateX(-50%);width:68px;height:68px;pointer-events:none;opacity:0;transition:opacity .25s;}

/* Controls */
.controls{display:flex;gap:8px;flex-wrap:wrap;justify-content:center;align-items:center;width:100%;}
.cg{display:flex;align-items:center;gap:7px;background:var(--surf);border:1px solid var(--bdr);border-radius:7px;padding:6px 12px;font-size:.82rem;color:rgba(255,255,255,.55);letter-spacing:.04em;}
.cg label{font-size:.7rem;text-transform:uppercase;letter-spacing:.08em;}
input[type=range]{-webkit-appearance:none;width:82px;height:4px;background:rgba(0,170,255,.18);border-radius:2px;outline:none;}
input[type=range]::-webkit-slider-thumb{-webkit-appearance:none;width:13px;height:13px;border-radius:50%;background:var(--neon);box-shadow:0 0 8px var(--neon);cursor:pointer;}
select{background:transparent;border:none;color:#fff;font-family:'Rajdhani',sans-serif;font-size:.88rem;outline:none;cursor:pointer;}
select option{background:#08080f;}
#startBtn{font-family:'Orbitron',monospace;font-size:.78rem;font-weight:700;letter-spacing:.1em;padding:8px 20px;background:transparent;border:1px solid var(--neon);color:var(--neon);border-radius:7px;cursor:pointer;text-transform:uppercase;transition:all .2s;box-shadow:0 0 10px rgba(0,170,255,.12);}
#startBtn:hover{background:rgba(0,170,255,.08);box-shadow:0 0 22px rgba(0,170,255,.28);}
#startBtn.active{border-color:#ff4444;color:#ff4444;}
#startBtn:disabled{opacity:.35;cursor:not-allowed;}
#status{font-family:'Orbitron',monospace;font-size:.66rem;letter-spacing:.08em;color:rgba(0,170,255,.7);text-align:center;min-height:1em;transition:color .3s;}
#status.orb{color:rgba(0,240,255,1);text-shadow:0 0 12px rgba(0,200,255,.8);}
#status.throw{color:rgba(255,200,0,1);text-shadow:0 0 12px rgba(255,150,0,.8);}
#status.shield{color:rgba(0,255,180,1);text-shadow:0 0 12px rgba(0,255,150,.7);}
.vd{font-family:'Orbitron',monospace;font-size:.75rem;color:var(--neon);min-width:18px;text-align:right;}

/* Hint */
.hints{display:flex;gap:7px;justify-content:center;flex-wrap:wrap;}
.gb{display:inline-flex;align-items:center;gap:4px;background:rgba(0,170,255,.05);border:1px solid rgba(0,170,255,.12);border-radius:5px;padding:3px 8px;font-size:.72rem;color:rgba(255,255,255,.38);}
</style>
</head>
<body>
<!-- Animated BG -->
<canvas id="bgCanvas"></canvas>

<div class="app">
  <h1>⚡ LIGHTNING HANDS PRO</h1>

  <div class="cam-wrap" id="camWrap">
    <video id="webcam" autoplay playsinline muted></video>
    <canvas id="overlay"></canvas>

    <!-- HUD -->
    <div id="hud">

        <div class="hud-pill" id="hudScore">SCORE: 0</div>

      <circle id="chargeArc" cx="34" cy="34" r="28" fill="none" stroke="#00aaff" stroke-width="5"
        stroke-linecap="round" stroke-dasharray="175.9" stroke-dashoffset="175.9"
        transform="rotate(-90 34 34)" style="transition:stroke-dashoffset .08s,stroke .2s;"/>

    <div id="modeBanner"></div>

  <div class="controls">
    <button id="startBtn">▶ Camera Shuru Karo</button>
    <div class="cg"><label>Power</label><input type="range" id="intCtrl" min="1" max="10" step="1" value="7"><span class="vd" id="intVal">7</span></div>
    <div class="cg"><label>Color</label>
      <select id="colorCtrl">
        <option value="electric">⚡ Blue</option>
        <option value="purple">🔮 Purple</option>
        <option value="gold">🌟 Gold</option>
        <option value="red">🔥 Red</option>
        <option value="green">☘️ Green</option>
      </select>
    </div>
    <div class="cg"><label>Mode</label>
      <select id="modeCtrl">
        <option value="arcade">🎮 Arcade</option>
        <option value="free">✨ Free Play</option>
        <option value="zen">🌌 Zen</option>
      </select>
    </div>
  </div>

  <div id="status">Camera ke liye button dabao</div>

  <div class="hints">
    <span class="gb">⚡ 1 haath → Bijli</span>
    <span class="gb">🌐 Dono palms → Orb charge</span>
    <span class="gb">🚀 5s hold → Throw!</span>
    <span class="gb">🛡 Fist → Shield</span>
    <span class="gb">🎯 Targets tod do!</span>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js" crossorigin="anonymous"></script>
<script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands/hands.js" crossorigin="anonymous"></script>
<script>
// ══════════════════════════════════════════════════
// BACKGROUND GRID
// ══════════════════════════════════════════════════
const bgCanvas=document.getElementById('bgCanvas');
const bgCtx=bgCanvas.getContext('2d');
let bgT=0;
function resizeBG(){bgCanvas.width=window.innerWidth;bgCanvas.height=window.innerHeight;}
resizeBG(); window.addEventListener('resize',resizeBG);
function drawBG(){
  bgCtx.clearRect(0,0,bgCanvas.width,bgCanvas.height);
  const W=bgCanvas.width,H=bgCanvas.height;
  const sz=55;
  bgCtx.strokeStyle='rgba(0,100,255,0.12)';
  bgCtx.lineWidth=.5;
  for(let x=0;x<W;x+=sz){
    bgCtx.beginPath();bgCtx.moveTo(x,0);bgCtx.lineTo(x,H);bgCtx.stroke();
  }
  for(let y=0;y<H;y+=sz){
    bgCtx.beginPath();bgCtx.moveTo(0,y);bgCtx.lineTo(W,y);bgCtx.stroke();
  }
  // Floating energy nodes
  bgCtx.fillStyle='rgba(0,150,255,0.4)';
  for(let i=0;i<8;i++){
    const x=(Math.sin(bgT*.0008+i*1.3)*.5+.5)*W;
    const y=(Math.cos(bgT*.0011+i*.9)*.5+.5)*H;
    bgCtx.beginPath();bgCtx.arc(x,y,2,0,Math.PI*2);bgCtx.fill();
  }
  bgT++; requestAnimationFrame(drawBG);
}
drawBG();

// ══════════════════════════════════════════════════
// SOUND ENGINE (Web Audio API)
// ══════════════════════════════════════════════════
let audioCtx=null;
function getAudio(){if(!audioCtx)audioCtx=new(window.AudioContext||window.webkitAudioContext)();return audioCtx;}

function playTone(freq,type,dur,vol,startFreq){
  try{
    const ac=getAudio();
    const osc=ac.createOscillator();
    const gain=ac.createGain();
    const filter=ac.createBiquadFilter();
    filter.type='bandpass';filter.frequency.value=freq;filter.Q.value=2;
    osc.connect(filter);filter.connect(gain);gain.connect(ac.destination);
    osc.type=type||'sawtooth';
    if(startFreq){osc.frequency.setValueAtTime(startFreq,ac.currentTime);osc.frequency.exponentialRampToValueAtTime(freq,ac.currentTime+dur*.4);}
    else osc.frequency.setValueAtTime(freq,ac.currentTime);
    gain.gain.setValueAtTime(vol||.15,ac.currentTime);
    gain.gain.exponentialRampToValueAtTime(.001,ac.currentTime+dur);
    osc.start(ac.currentTime);osc.stop(ac.currentTime+dur);
  }catch(e){}
}

function playExplosion(){
  try{
    const ac=getAudio();
    const buf=ac.createBuffer(1,ac.sampleRate*.5,ac.sampleRate);
    const d=buf.getChannelData(0);
    for(let i=0;i<d.length;i++) d[i]=(Math.random()*2-1)*Math.pow(1-i/d.length,1.5);
    const src=ac.createBufferSource();src.buffer=buf;
    const gain=ac.createGain();gain.gain.setValueAtTime(.4,ac.currentTime);
    gain.gain.exponentialRampToValueAtTime(.001,ac.currentTime+.5);
    src.connect(gain);gain.connect(ac.destination);src.start();
  }catch(e){}
}

function playCrackle(){playTone(80+(Math.random()*40),'sawtooth',.08,.08);}
function playCharge(t){playTone(200+t*600,'sine',.15,.1);}
function playThrow(){playTone(900,'sine',.3,.18,200);playTone(600,'sawtooth',.2,.1);}
function playScore(){playTone(880,'sine',.12,.15);setTimeout(()=>playTone(1100,'sine',.12,.15),80);}
function playShield(){playTone(440,'sine',.3,.1,800);}
function playCombo(n){playTone(440+n*80,'sine',.15,.2);}

// ══════════════════════════════════════════════════
// DOM
// ══════════════════════════════════════════════════
const video=document.getElementById('webcam');
const canvas=document.getElementById('overlay');
const ctx=canvas.getContext('2d');
const startBtn=document.getElementById('startBtn');
const statusEl=document.getElementById('status');
const intCtrl=document.getElementById('intCtrl');
const intVal=document.getElementById('intVal');
const colorCtrl=document.getElementById('colorCtrl');
const modeCtrl=document.getElementById('modeCtrl');
const offScreen=document.getElementById('offScreen');
const offMsg=document.getElementById('offMsg');
const camWrap=document.getElementById('camWrap');
const loadBar=document.getElementById('loadBar');
const hudScore=document.getElementById('hudScore');
const hudCombo=document.getElementById('hudCombo');
const hudLevel=document.getElementById('hudLevel');
const hudHands=document.getElementById('hudHands');
const hudMode=document.getElementById('hudMode');
const hudShield=document.getElementById('hudShield');
const hudTargets=document.getElementById('hudTargets');
const hudAmmo=document.getElementById('hudAmmo');
const hudTip=document.getElementById('hudTip');
const chargeRingEl=document.getElementById('chargeRing');
const chargeArc=document.getElementById('chargeArc');
const chargeText=document.getElementById('chargeText');
const modeBanner=document.getElementById('modeBanner');

intCtrl.addEventListener('input',()=>intVal.textContent=intCtrl.value);

// ══════════════════════════════════════════════════
// GAME STATE
// ══════════════════════════════════════════════════
let running=false,animId;
let handsData=[];
let mpCamera=null,mpHands=null;

// Scoring
let score=0,combo=1,lastHitTime=0,level=1,xp=0;

// Orb charge
const ORB_HOLD=5000;
let orbHoldStart=null,orbCharge=0,orbFullSince=null;
let prevMidX=null,prevMidY=null,palmVelX=0,palmVelY=0;

// Effects
let bolts=[],particles=[],targets=[],scorePops=[];
let thrownOrbs=[];  // multiple thrown orbs
let shieldActive=false,shieldPulse=0;
let screenFlash=0,flashColor='255,255,255';
let orbPulse=0;
let lightningChain=[];  // chain lightning between targets

// Shield history (wrist positions for fist detection)
let fistCooldown=0;

// Ambient electricity on fingertips
let ambientT=0;

const COLORS={
  electric:{core:'#fff',mid:'#88ddff',outer:'#0066ff',glow:'rgba(0,120,255,',orbA:'rgba(0,180,255,',orbB:'rgba(0,50,200,',expA:'#00ccff',expB:'#0044ff',shA:'rgba(0,200,255,'},
  purple:  {core:'#fff',mid:'#dd88ff',outer:'#9900cc',glow:'rgba(150,0,230,',orbA:'rgba(180,0,255,',orbB:'rgba(60,0,160,',expA:'#cc44ff',expB:'#7700bb',shA:'rgba(160,0,255,'},
  gold:    {core:'#fff',mid:'#ffee88',outer:'#ff8800',glow:'rgba(255,150,0,',orbA:'rgba(255,190,0,',orbB:'rgba(180,60,0,',expA:'#ffcc00',expB:'#ff5500',shA:'rgba(255,180,0,'},
  red:     {core:'#fff',mid:'#ff9988',outer:'#dd0000',glow:'rgba(220,0,0,',orbA:'rgba(255,50,0,',orbB:'rgba(140,0,0,',expA:'#ff4400',expB:'#cc0000',shA:'rgba(255,50,0,'},
  green:   {core:'#fff',mid:'#88ffcc',outer:'#00bb44',glow:'rgba(0,180,80,',orbA:'rgba(0,220,120,',orbB:'rgba(0,100,30,',expA:'#00ff88',expB:'#009944',shA:'rgba(0,220,120,'},
};

// ══════════════════════════════════════════════════
// MEDIAPIPE HELPERS
// ══════════════════════════════════════════════════
const FTIPS=[4,8,12,16,20];
function lm2px(lm,W,H){return{x:(1-lm.x)*W,y:lm.y*H};}
function getPalm(lms,W,H){const w=lm2px(lms[0],W,H),m=lm2px(lms[9],W,H);return{x:(w.x+m.x)/2,y:(w.y+m.y)/2};}
function getFingertips(lms,W,H){return FTIPS.map(id=>lm2px(lms[id],W,H));}
function isPush(lms){return lms[0].y>lms[9].y-.04 && Math.abs(lms[8].x-lms[20].x)>.13;}
// Fist = all fingertips below their MCP joints
function isFist(lms){return[8,12,16,20].every(id=>lms[id].y>lms[id-2].y+.02);}
// Index point = only index finger extended
function isPointing(lms){return lms[8].y<lms[6].y-.04&&lms[12].y>lms[10].y&&lms[16].y>lms[14].y&&lms[20].y>lms[18].y;}

// ══════════════════════════════════════════════════
// TARGET SYSTEM
// ══════════════════════════════════════════════════
class Target{
  constructor(W,H,lvl){
    this.r=22+Math.random()*18;
    this.x=this.r*2+Math.random()*(W-this.r*4);
    this.y=this.r*2+Math.random()*(H*.7);
    this.hp=1+Math.floor(lvl/3);
    this.maxHp=this.hp;
    this.vx=(Math.random()-.5)*(1+lvl*.18);
    this.vy=(Math.random()-.5)*(1+lvl*.18);
    this.type=Math.random()<.15?'shield':(Math.random()<.2?'bomb':'normal');
    this.pulse=Math.random()*Math.PI*2;
    this.hitFlash=0;
    this.alive=true;
    this.age=0;
  }
  update(W,H){
    this.x+=this.vx; this.y+=this.vy; this.pulse+=.05; this.age++;
    if(this.hitFlash>0) this.hitFlash-=.1;
    if(this.x<this.r||this.x>W-this.r) this.vx*=-1;
    if(this.y<this.r||this.y>H*.85-this.r) this.vy*=-1;
  }
  draw(ctx,color){
    const c=COLORS[color];
    const pulse=1+Math.sin(this.pulse)*.08;
    const r=this.r*pulse;
    ctx.save(); ctx.globalCompositeOperation='lighter';
    // Glow
    const g=ctx.createRadialGradient(this.x,this.y,0,this.x,this.y,r*2.5);
    if(this.type==='bomb'){
      g.addColorStop(0,'rgba(255,50,0,.6)');g.addColorStop(.5,'rgba(200,0,0,.2)');g.addColorStop(1,'rgba(0,0,0,0)');
    } else if(this.type==='shield'){
      g.addColorStop(0,'rgba(0,255,150,.5)');g.addColorStop(.5,'rgba(0,200,100,.15)');g.addColorStop(1,'rgba(0,0,0,0)');
    } else {
      g.addColorStop(0,c.orbA+'.5)');g.addColorStop(.5,c.orbA+'.15)');g.addColorStop(1,'rgba(0,0,0,0)');
    }
    ctx.fillStyle=g;ctx.beginPath();ctx.arc(this.x,this.y,r*2.5,0,Math.PI*2);ctx.fill();
    // Core
    ctx.globalCompositeOperation='source-over';
    ctx.strokeStyle=this.hitFlash>0?'rgba(255,255,255,.9)':(this.type==='bomb'?'rgba(255,80,0,.8)':this.type==='shield'?'rgba(0,255,150,.8)':c.orbA+'.8)');
    ctx.lineWidth=2;
    ctx.beginPath();ctx.arc(this.x,this.y,r,0,Math.PI*2);ctx.stroke();
    // HP bar
    if(this.maxHp>1){
      const bw=r*2,bh=4,bx=this.x-r,by=this.y+r+5;
      ctx.fillStyle='rgba(0,0,0,.5)';ctx.fillRect(bx,by,bw,bh);
      ctx.fillStyle=this.type==='bomb'?'#ff4400':'#00ffaa';
      ctx.fillRect(bx,by,bw*(this.hp/this.maxHp),bh);
    }
    // Icon
    ctx.globalAlpha=.9;
    ctx.font=`${r*.85}px Arial`;ctx.textAlign='center';ctx.textBaseline='middle';ctx.fillStyle='#fff';
    ctx.fillText(this.type==='bomb'?'💣':this.type==='shield'?'🛡':'⚡',this.x,this.y);
    ctx.restore();
  }
}

function spawnTarget(W,H){
  targets.push(new Target(W,H,level));
}

// ══════════════════════════════════════════════════
// BOLT CLASS
// ══════════════════════════════════════════════════
class Bolt{
  constructor(x1,y1,x2,y2,color,intensity,branch,thick){
    this.color=color;this.intensity=intensity;this.thick=thick||1;
    this.life=branch?.5+Math.random()*.5:1;this.maxLife=this.life;
    this.decay=.065+Math.random()*.085;
    this.segs=this.gen(x1,y1,x2,y2,branch?4:5);
  }
  gen(x1,y1,x2,y2,d){
    if(d===0)return[[x1,y1,x2,y2]];
    const sp=this.intensity*13*this.thick;
    const mx=(x1+x2)/2+(Math.random()-.5)*sp,my=(y1+y2)/2+(Math.random()-.5)*sp;
    const l=this.gen(x1,y1,mx,my,d-1),r=this.gen(mx,my,x2,y2,d-1);
    if(Math.random()<.28&&d>=2){const bx=mx+(Math.random()-.5)*70,by=my-10-Math.random()*55;return[...l,...r,...this.gen(mx,my,bx,by,d-2)];}
    return[...l,...r];
  }
  draw(){
    if(this.life<=0)return;
    const c=COLORS[this.color],a=this.life/this.maxLife,t=this.thick;
    ctx.save();ctx.globalCompositeOperation='lighter';
    for(const[x1,y1,x2,y2]of this.segs){
      ctx.beginPath();ctx.moveTo(x1,y1);ctx.lineTo(x2,y2);
      ctx.strokeStyle=c.glow+(a*.15)+')';ctx.lineWidth=14*t;ctx.stroke();
      ctx.strokeStyle=c.outer;ctx.globalAlpha=a*.55;ctx.lineWidth=3.5*t;ctx.stroke();
      ctx.strokeStyle=c.mid;ctx.globalAlpha=a*.88;ctx.lineWidth=1.6*t;ctx.stroke();
      ctx.strokeStyle=c.core;ctx.globalAlpha=a;ctx.lineWidth=.7*t;ctx.stroke();
    }
    ctx.restore();this.life-=this.decay;
  }
}

// ══════════════════════════════════════════════════
// PARTICLE CLASS
// ══════════════════════════════════════════════════
class Particle{
  constructor(x,y,vx,vy,color,r,life,type){
    this.x=x;this.y=y;this.vx=vx;this.vy=vy;this.color=color;this.r=r;
    this.life=life;this.maxLife=life;this.gravity=.15+Math.random()*.1;
    this.type=type||'spark';
  }
  update(){this.x+=this.vx;this.y+=this.vy;this.vy+=this.gravity;this.vx*=.97;this.life--;}
  draw(){
    if(this.life<=0)return;
    const a=this.life/this.maxLife,c=COLORS[this.color];
    ctx.save();ctx.globalCompositeOperation='lighter';
    if(this.type==='spark'){
      ctx.strokeStyle=c.mid;ctx.globalAlpha=a;ctx.lineWidth=1.5;
      ctx.beginPath();ctx.moveTo(this.x,this.y);ctx.lineTo(this.x-this.vx*4,this.y-this.vy*4);ctx.stroke();
    } else if(this.type==='energy'){
      const g=ctx.createRadialGradient(this.x,this.y,0,this.x,this.y,this.r*(2-a));
      g.addColorStop(0,c.orbA+(a*.9)+')');g.addColorStop(.5,c.orbA+(a*.3)+')');g.addColorStop(1,'rgba(0,0,0,0)');
      ctx.fillStyle=g;ctx.beginPath();ctx.arc(this.x,this.y,this.r*(2-a),0,Math.PI*2);ctx.fill();
    } else {
      // ring
      ctx.strokeStyle=c.orbA+(a*.6)+')';ctx.lineWidth=2;
      ctx.beginPath();ctx.arc(this.x,this.y,this.r*(1+(1-a)*3),0,Math.PI*2);ctx.stroke();
    }
    ctx.restore();
  }
}

// ══════════════════════════════════════════════════
// SPAWN HELPERS
// ══════════════════════════════════════════════════
function spawnTipBolts(tips,intensity,color){
  const rate=Math.ceil(intensity/2.5);
  for(let i=0;i<rate;i++){
    if(Math.random()<.72){
      const tip=tips[Math.floor(Math.random()*tips.length)];
      const angle=-Math.PI/2+(Math.random()-.5)*1.5;
      const len=50+Math.random()*intensity*16;
      bolts.push(new Bolt(tip.x,tip.y,tip.x+Math.cos(angle)*len,tip.y+Math.sin(angle)*len,color,intensity,false,1));
    }
    if(tips.length>=2&&Math.random()<.25){
      const a=tips[Math.floor(Math.random()*tips.length)];
      const b=tips[Math.floor(Math.random()*tips.length)];
      if(a!==b)bolts.push(new Bolt(a.x,a.y,b.x,b.y,color,intensity,true,1));
    }
  }
  if(Math.random()<.4) playCrackle();
}

function spawnOrbBolts(orb,intensity,color,th){
  const rate=Math.ceil(intensity/1.5);
  for(let i=0;i<rate;i++){
    const angle=Math.random()*Math.PI*2;
    const sx=orb.cx+Math.cos(angle)*orb.r*.88,sy=orb.cy+Math.sin(angle)*orb.r*.88;
    const ex=orb.cx+Math.cos(angle)*(orb.r+18+Math.random()*intensity*12);
    const ey=orb.cy+Math.sin(angle)*(orb.r+18+Math.random()*intensity*12);
    bolts.push(new Bolt(sx,sy,ex,ey,color,intensity,true,th||1));
    if(Math.random()<.3&&orb.palmA) bolts.push(new Bolt(orb.palmA.x,orb.palmA.y,sx,sy,color,intensity,true,th||1));
    if(Math.random()<.3&&orb.palmB) bolts.push(new Bolt(orb.palmB.x,orb.palmB.y,sx,sy,color,intensity,true,th||1));
  }
}

function explode(cx,cy,color,intensity,r,isBomb){
  const count=(isBomb?120:60)+intensity*10;
  for(let i=0;i<count;i++){
    const angle=Math.random()*Math.PI*2;
    const speed=2+Math.random()*intensity*(isBomb?2.5:1.8);
    particles.push(new Particle(cx,cy,Math.cos(angle)*speed,Math.sin(angle)*speed-2,color,3+Math.random()*r*.18,40+Math.random()*30,'spark'));
    if(i%3===0) particles.push(new Particle(cx,cy,Math.cos(angle)*speed*.4,Math.sin(angle)*speed*.4-1,color,r*.25,25+Math.random()*20,'energy'));
  }
  // Shockwave ring
  particles.push(new Particle(cx,cy,0,0,color,r*.8,20,'ring'));
  // Big radial bolts
  const bcount=isBomb?24:14;
  for(let i=0;i<bcount;i++){
    const a=(i/bcount)*Math.PI*2;
    const len=r*(isBomb?2.2:1.6)+Math.random()*intensity*18;
    bolts.push(new Bolt(cx,cy,cx+Math.cos(a)*len,cy+Math.sin(a)*len,color,intensity,false,isBomb?3:2));
  }
  screenFlash=1; flashColor=isBomb?'255,100,0':'255,255,255';
  camWrap.classList.add('shake');
  setTimeout(()=>camWrap.classList.remove('shake'),320);
  playExplosion();
  if(isBomb){
    // Chain explosion nearby targets
    targets.forEach(t=>{
      const dx=t.x-cx,dy=t.y-cy;
      if(Math.sqrt(dx*dx+dy*dy)<120) hitTarget(t,color,intensity,cx,cy);
    });
  }
}

function chainLightning(from,toList,color,intensity){
  // Arc lightning jumping between targets
  let cur=from;
  for(const t of toList){
    bolts.push(new Bolt(cur.x,cur.y,t.x,t.y,color,intensity,false,2));
    cur=t;
  }
}

// ══════════════════════════════════════════════════
// HIT DETECTION
// ══════════════════════════════════════════════════
function hitTarget(t,color,intensity,fromX,fromY){
  if(!t.alive)return;
  t.hp--;t.hitFlash=1;
  if(t.hp<=0){
    t.alive=false;
    const pts=t.type==='bomb'?50:t.type==='shield'?25:10;
    const now=Date.now();
    if(now-lastHitTime<1500) combo=Math.min(20,combo+1);
    else combo=1;
    lastHitTime=now;
    score+=pts*combo;
    xp+=pts;
    if(xp>=level*100){xp=0;level++;showBanner(`LEVEL ${level}!`,'#ffee00');}
    popScore(t.x,t.y,pts*combo,t.type==='bomb'?'BOOM +':'+');
    playScore();if(combo>1)playCombo(combo);
    if(t.type==='bomb') explode(t.x,t.y,color,intensity,t.r+30,true);
    else {
      explode(t.x,t.y,color,intensity,t.r+20,false);
      if(t.type==='shield'){shieldActive=true;setTimeout(()=>{shieldActive=false;},4000);playShield();}
    }
    // Chain lightning to nearby alive targets
    const nearby=targets.filter(o=>o.alive&&o!==t&&Math.hypot(o.x-t.x,o.y-t.y)<160).slice(0,3);
    if(nearby.length)chainLightning({x:t.x,y:t.y},nearby,color,intensity);
  }
  updateHUD();
}

function checkOrbHitTargets(orb,color,intensity){
  for(const t of targets){
    if(!t.alive)continue;
    const dx=t.x-orb.cx,dy=t.y-orb.cy;
    if(Math.sqrt(dx*dx+dy*dy)<t.r+orb.r*.8) hitTarget(t,color,intensity,orb.cx,orb.cy);
  }
}

function checkTipHitTargets(tips,color,intensity){
  for(const t of targets){
    if(!t.alive)continue;
    for(const tip of tips){
      const dx=t.x-tip.x,dy=t.y-tip.y;
      if(Math.sqrt(dx*dx+dy*dy)<t.r+18){hitTarget(t,color,intensity,tip.x,tip.y);break;}
    }
  }
}

// ══════════════════════════════════════════════════
// SHIELD DRAWING
// ══════════════════════════════════════════════════
function drawShield(palmCenters,W,H){
  if(!shieldActive||!palmCenters.length)return;
  shieldPulse=(shieldPulse+.05)%(Math.PI*2);
  const cx=palmCenters.reduce((s,p)=>s+p.x,0)/palmCenters.length;
  const cy=palmCenters.reduce((s,p)=>s+p.y,0)/palmCenters.length;
  const r=80+Math.sin(shieldPulse)*8;
  ctx.save();ctx.globalCompositeOperation='lighter';
  // Shield dome
  const g=ctx.createRadialGradient(cx,cy,r*.5,cx,cy,r);
  g.addColorStop(0,'rgba(0,255,200,.05)');g.addColorStop(.7,'rgba(0,200,255,.12)');g.addColorStop(1,'rgba(0,150,255,.25)');
  ctx.fillStyle=g;ctx.beginPath();ctx.arc(cx,cy,r,0,Math.PI*2);ctx.fill();
  // Hexagonal shield lines
  ctx.strokeStyle='rgba(0,255,200,.4)';ctx.lineWidth=1.5;
  for(let i=0;i<6;i++){
    const a=(i/6)*Math.PI*2+shieldPulse*.3;
    ctx.beginPath();ctx.moveTo(cx,cy);ctx.lineTo(cx+Math.cos(a)*r,cy+Math.sin(a)*r);ctx.stroke();
  }
  ctx.strokeStyle='rgba(0,200,255,.6)';ctx.lineWidth=2;
  ctx.beginPath();ctx.arc(cx,cy,r,0,Math.PI*2);ctx.stroke();
  ctx.restore();
  // Shield bolts
  if(Math.random()<.3){
    const a=Math.random()*Math.PI*2;
    bolts.push(new Bolt(cx+Math.cos(a)*r,cy+Math.sin(a)*r,cx+Math.cos(a+.5)*r*.8,cy+Math.sin(a+.5)*r*.8,'electric',3,true,1));
  }
}

// ══════════════════════════════════════════════════
// ORB DRAWING
// ══════════════════════════════════════════════════
function drawOrb(orb,color,charge){
  const c=COLORS[color];const{cx,cy}=orb;
  const pr=orb.r*(0.92+Math.sin(orbPulse)*.06);
  ctx.save();ctx.globalCompositeOperation='lighter';
  for(let layer=5;layer>=1;layer--){
    const lr=pr*(1+layer*.3)*(1+charge*.35),alpha=.038/layer;
    const g=ctx.createRadialGradient(cx,cy,0,cx,cy,lr);
    g.addColorStop(0,c.orbA+(alpha*3)+')');g.addColorStop(.6,c.orbA+alpha+')');g.addColorStop(1,'rgba(0,0,0,0)');
    ctx.fillStyle=g;ctx.beginPath();ctx.arc(cx,cy,lr,0,Math.PI*2);ctx.fill();
  }
  const g2=ctx.createRadialGradient(cx-pr*.28,cy-pr*.28,0,cx,cy,pr);
  g2.addColorStop(0,'rgba(255,255,255,.98)');g2.addColorStop(.12,c.orbA+'.92)');g2.addColorStop(.5,c.orbB+'.68)');g2.addColorStop(.9,c.orbB+'.14)');g2.addColorStop(1,'rgba(0,0,0,0)');
  ctx.fillStyle=g2;ctx.beginPath();ctx.arc(cx,cy,pr,0,Math.PI*2);ctx.fill();
  if(charge<1){
    ctx.strokeStyle=c.orbA+'.65)';ctx.lineWidth=3;
    ctx.beginPath();ctx.arc(cx,cy,pr+4,-Math.PI/2,-Math.PI/2+Math.PI*2*charge);ctx.stroke();
  }
  for(let ring=0;ring<3;ring++){
    ctx.save();ctx.translate(cx,cy);ctx.rotate(orbPulse*(ring===0?1.2:ring===1?-.8:.5)+(ring*Math.PI*.55));
    ctx.strokeStyle=c.orbA+(.5-ring*.1)+')';ctx.lineWidth=1.5+ring*.5;
    ctx.beginPath();ctx.arc(0,0,pr*(.74+ring*.13),-.5+ring*.1,Math.PI*(.86+ring*.15));ctx.stroke();ctx.restore();
  }
  for(const palm of[orb.palmA,orb.palmB]){
    if(!palm)continue;
    const dx=palm.x-cx,dy=palm.y-cy,dist=Math.sqrt(dx*dx+dy*dy);
    if(dist<5)continue;
    const nx=dx/dist,ny=dy/dist;
    const sx=cx+nx*pr,sy=cy+ny*pr;
    ctx.strokeStyle=c.orbA+'.28)';ctx.lineWidth=8;ctx.beginPath();ctx.moveTo(sx,sy);ctx.lineTo(palm.x,palm.y);ctx.stroke();
    ctx.strokeStyle=c.core;ctx.globalAlpha=.6;ctx.lineWidth=1.2;ctx.beginPath();ctx.moveTo(sx,sy);ctx.lineTo(palm.x,palm.y);ctx.stroke();ctx.globalAlpha=1;
  }
  ctx.restore();
}

// ══════════════════════════════════════════════════
// THROWN ORB
// ══════════════════════════════════════════════════
function drawThrownOrb(to){
  const c=COLORS[to.color];const a=to.life/to.maxLife;
  ctx.save();ctx.globalCompositeOperation='lighter';
  for(let i=to.trail.length-1;i>=0;i--){
    const tp=to.trail[i];
    const ta=(i/to.trail.length)*a*.35;
    const tr=to.r*(i/to.trail.length)*.65;
    if(tr<2)continue;
    const g=ctx.createRadialGradient(tp.x,tp.y,0,tp.x,tp.y,tr);
    g.addColorStop(0,c.orbA+ta+')');g.addColorStop(1,'rgba(0,0,0,0)');
    ctx.fillStyle=g;ctx.beginPath();ctx.arc(tp.x,tp.y,tr,0,Math.PI*2);ctx.fill();
  }
  const pr=to.r*(.8+Math.sin(orbPulse*.4)*.05)*a;
  for(let layer=4;layer>=1;layer--){
    const lr=pr*(1+layer*.28),alpha=.045/layer*a;
    const g=ctx.createRadialGradient(to.cx,to.cy,0,to.cx,to.cy,lr);
    g.addColorStop(0,c.orbA+(alpha*3)+')');g.addColorStop(.6,c.orbA+alpha+')');g.addColorStop(1,'rgba(0,0,0,0)');
    ctx.fillStyle=g;ctx.beginPath();ctx.arc(to.cx,to.cy,lr,0,Math.PI*2);ctx.fill();
  }
  const g2=ctx.createRadialGradient(to.cx-pr*.3,to.cy-pr*.3,0,to.cx,to.cy,pr);
  g2.addColorStop(0,'rgba(255,255,255,.98)');g2.addColorStop(.12,c.orbA+'.9)');g2.addColorStop(.5,c.orbB+'.65)');g2.addColorStop(1,'rgba(0,0,0,0)');
  ctx.fillStyle=g2;ctx.beginPath();ctx.arc(to.cx,to.cy,pr,0,Math.PI*2);ctx.fill();
  ctx.restore();
}

// ══════════════════════════════════════════════════
// TIP GLOW
// ══════════════════════════════════════════════════
function drawTipGlow(tips,color,intensity){
  const c=COLORS[color];
  for(const tip of tips){
    ctx.save();ctx.globalCompositeOperation='lighter';
    const r=18+intensity*2.8;
    const g=ctx.createRadialGradient(tip.x,tip.y,0,tip.x,tip.y,r);
    g.addColorStop(0,c.glow+'.95)');g.addColorStop(.4,c.glow+'.4)');g.addColorStop(1,c.glow+'0)');
    ctx.fillStyle=g;ctx.beginPath();ctx.arc(tip.x,tip.y,r,0,Math.PI*2);ctx.fill();
    // Ambient crackle arcs from tip
    if(Math.random()<.3){
      const a2=-Math.PI/2+(Math.random()-.5)*.8;
      const len=20+Math.random()*intensity*8;
      bolts.push(new Bolt(tip.x,tip.y,tip.x+Math.cos(a2)*len,tip.y+Math.sin(a2)*len,color,intensity,true,.6));
    }
    ctx.restore();
  }
}

// ══════════════════════════════════════════════════
// TARGET SPAWNER (Arcade mode)
// ══════════════════════════════════════════════════
let lastSpawn=0;
function maybeSpawnTarget(W,H){
  const mode=modeCtrl.value;
  if(mode!=='arcade')return;
  const alive=targets.filter(t=>t.alive).length;
  const maxTargets=3+level;
  const spawnInterval=Math.max(1500,3000-level*150);
  if(alive<maxTargets&&Date.now()-lastSpawn>spawnInterval){
    spawnTarget(W,H);lastSpawn=Date.now();
    targets=targets.filter(t=>t.alive||t.age<200);
  }
}

// ══════════════════════════════════════════════════
// MAIN RENDER LOOP
// ══════════════════════════════════════════════════
let lastTime=0;

function renderFrame(ts){
  if(!running)return;
  animId=requestAnimationFrame(renderFrame);
  const dt=ts-lastTime;lastTime=ts;
  orbPulse=(orbPulse+.055)%(Math.PI*2);
  ambientT++;

  const W=canvas.width,H=canvas.height;
  const intensity=parseInt(intCtrl.value);
  const color=colorCtrl.value;
  const gameMode=modeCtrl.value;

  ctx.clearRect(0,0,W,H);

  // Spawn targets
  maybeSpawnTarget(W,H);

  // ── TARGETS ──────────────────────────────────
  for(const t of targets){if(t.alive){t.update(W,H);t.draw(ctx,color);}}
  targets=targets.filter(t=>t.alive||t.age<300);

  // ── THROWN ORBS ──────────────────────────────
  for(let i=thrownOrbs.length-1;i>=0;i--){
    const to=thrownOrbs[i];
    to.trail.push({x:to.cx,y:to.cy});
    if(to.trail.length>24)to.trail.shift();
    to.cx+=to.vx;to.cy+=to.vy;
    to.vx*=.988;to.life--;

    // Trail bolts
    if(Math.random()<.65){
      const a=Math.random()*Math.PI*2;
      const sx=to.cx+Math.cos(a)*to.r*.7,sy=to.cy+Math.sin(a)*to.r*.7;
      bolts.push(new Bolt(sx,sy,sx+(Math.random()-.5)*55,sy+(Math.random()-.5)*55,color,intensity,true,1.4));
    }

    // Hit targets
    if(gameMode==='arcade') checkOrbHitTargets(to,color,intensity);

    const margin=to.r;
    if(to.cx<margin||to.cx>W-margin||to.cy<margin||to.cy>H-margin||to.life<=0){
      explode(Math.min(Math.max(to.cx,margin),W-margin),Math.min(Math.max(to.cy,margin),H-margin),color,intensity,to.r,false);
      thrownOrbs.splice(i,1);
      camWrap.classList.remove('throw-glow');
    } else {
      drawThrownOrb(to);
    }
  }

  // ── PARTICLES ────────────────────────────────
  for(const p of particles){p.update();p.draw();}
  particles=particles.filter(p=>p.life>0);

  // ── BOLTS ────────────────────────────────────
  bolts=bolts.filter(b=>b.life>0).slice(-200);
  for(const b of bolts)b.draw();

  // ── NO HANDS ─────────────────────────────────
  if(!handsData.length){
    hudHands.textContent='👐 0 haath';hudMode.className='hud-pill warn';hudMode.textContent='WAIT...';
    updateChargeHUD(0,false);drawFlash();
    statusEl.textContent='Haath camera ke saamne laao';statusEl.className='';
    hudTip.textContent='Haath laao!';
    return;
  }

  // ── HAND PROCESSING ──────────────────────────
  const allTips=[],palmCenters=[],pushPalms=[],fistPalms=[],pointPalms=[];
  for(const lms of handsData){
    const tips=getFingertips(lms,W,H);
    const palm=getPalm(lms,W,H);
    allTips.push(...tips);palmCenters.push(palm);
    if(isPush(lms))pushPalms.push(palm);
    if(isFist(lms))fistPalms.push(palm);
    if(isPointing(lms))pointPalms.push(palm);
  }

  hudHands.textContent=`👐 ${handsData.length} haath`;

  // ── SHIELD GESTURE (fist) ────────────────────
  if(fistPalms.length>0&&fistCooldown<=0&&!shieldActive){
    shieldActive=true;
    fistCooldown=180;
    playShield();
    showBanner('🛡 SHIELD!','#00ffcc');
    camWrap.classList.add('shield-glow');
    setTimeout(()=>{shieldActive=false;camWrap.classList.remove('shield-glow');},5000);
  }
  if(fistCooldown>0)fistCooldown--;

  // Draw shield
  if(shieldActive){
    drawShield(palmCenters,W,H);
    hudShield.textContent='🛡 SHIELD: ON';hudShield.className='hud-pill good';
    camWrap.classList.add('shield-glow');
  } else {
    camWrap.classList.remove('shield-glow');
    hudShield.textContent='🛡 SHIELD: OFF';hudShield.className='hud-pill';
  }

  // ── TWO HAND ORB ─────────────────────────────
  const twoHandPush=handsData.length>=2&&pushPalms.length>=2;

  if(twoHandPush&&thrownOrbs.length<3){
    if(!orbHoldStart)orbHoldStart=Date.now();
    const elapsed=Date.now()-orbHoldStart;
    const charge=Math.min(1,elapsed/ORB_HOLD);
    orbCharge=orbCharge*.87+charge*.13;

    const midX=(pushPalms[0].x+pushPalms[1].x)/2;
    const midY=(pushPalms[0].y+pushPalms[1].y)/2;
    if(prevMidX!==null){palmVelX=palmVelX*.7+(midX-prevMidX)*.3;palmVelY=palmVelY*.7+(midY-prevMidY)*.3;}
    prevMidX=midX;prevMidY=midY;

    const dx=pushPalms[0].x-pushPalms[1].x,dy=pushPalms[0].y-pushPalms[1].y;
    const dist=Math.sqrt(dx*dx+dy*dy);
    const r=Math.max(28,Math.min(260,dist*.44))*(0.8+intensity*.022);
    const orbData={cx:midX,cy:midY,r,palmA:pushPalms[0],palmB:pushPalms[1]};

    drawOrb(orbData,color,orbCharge);
    spawnOrbBolts(orbData,intensity*Math.max(.3,orbCharge)+.5,color,orbCharge>.8?1.8:1);
    updateChargeHUD(orbCharge,true);

    // Charging sound
    if(Math.random()<.08) playCharge(orbCharge);

    if(orbCharge>=1){
      statusEl.textContent='🚀 READY — Haath kisi bhi disha mein fenk do!';statusEl.className='throw';
      hudMode.textContent='THROW READY!';hudMode.className='hud-pill warn';
      camWrap.classList.add('orb-glow');
      if(!orbFullSince)orbFullSince=Date.now();
      // Supercharge bolts
      if(Math.random()<.5) spawnOrbBolts(orbData,intensity*2,color,2.5);
    } else {
      statusEl.textContent=`🌐 CHARGING — ${Math.round(orbCharge*5)}s / 5s`;statusEl.className='orb';
      hudMode.textContent='CHARGING ORB';hudMode.className='hud-pill';
      camWrap.classList.toggle('orb-glow',orbCharge>.5);
      orbFullSince=null;
    }

  } else if(!twoHandPush&&orbCharge>0.8&&prevMidX!==null){
    // THROW!
    let vx=palmVelX*2.5,vy=palmVelY*2.5;
    const spd=Math.sqrt(vx*vx+vy*vy);
    const minS=7,maxS=20;
    if(spd<minS){const s=minS/Math.max(spd,.01);vx*=s;vy*=s;}
    if(spd>maxS){const s=maxS/spd;vx*=s;vy*=s;}
    const r=Math.max(35,Math.min(180,orbCharge*140));
    thrownOrbs.push({cx:prevMidX,cy:prevMidY,vx,vy,r,life:100,maxLife:100,color,intensity,trail:[]});
    camWrap.classList.add('throw-glow');
    statusEl.textContent='🚀 ORB LAUNCHED!';statusEl.className='throw';
    hudMode.textContent='ORB FLYING';
    showBanner('THROW!','#ffaa00');
    playThrow();
    orbHoldStart=null;orbCharge=0;orbFullSince=null;prevMidX=null;prevMidY=null;palmVelX=0;palmVelY=0;

  } else if(!twoHandPush){
    orbHoldStart=null;
    orbCharge=orbCharge*.88;
    prevMidX=null;prevMidY=null;palmVelX=0;palmVelY=0;
    updateChargeHUD(orbCharge,orbCharge>.05);
    camWrap.classList.remove('orb-glow');

    // Normal fingertip lightning
    if(fistPalms.length===0){
      spawnTipBolts(allTips,intensity,color);
      drawTipGlow(allTips,color,intensity);
      if(gameMode==='arcade') checkTipHitTargets(allTips,color,intensity);
    }

    const modeStr=handsData.length===2?'DUAL LIGHTNING':`LIGHTNING`;
    statusEl.textContent=`⚡ ${modeStr} — Dono palms push karo → Orb banao`;statusEl.className='';
    hudMode.textContent=modeStr;hudMode.className='hud-pill';
  }

  // ── ZEN MODE ambient particles ───────────────
  if(modeCtrl.value==='zen'&&ambientT%20===0){
    const x=Math.random()*W,y=Math.random()*H;
    particles.push(new Particle(x,y,(Math.random()-.5)*1,(Math.random()-.5)*1-1,color,4+Math.random()*8,60,'energy'));
  }

  drawFlash();
  updateHUD();

  // Tip info
  const tips2=['Fist = Shield!','Dono haath = Orb!','Targets tod do!','5s hold → Throw!'];
  if(ambientT%200===0) hudTip.textContent=tips2[Math.floor(Math.random()*tips2.length)];
}

// ══════════════════════════════════════════════════
// MEDIAPIPE INIT
// ══════════════════════════════════════════════════
async function initMP(){
  startBtn.disabled=true;offMsg.textContent='MediaPipe load ho raha hai...';loadBar.style.width='30%';
  mpHands=new Hands({locateFile:(f)=>`https://cdn.jsdelivr.net/npm/@mediapipe/hands/${f}`});
  mpHands.setOptions({maxNumHands:2,modelComplexity:1,minDetectionConfidence:.72,minTrackingConfidence:.65});
  mpHands.onResults((res)=>{handsData=res.multiHandLandmarks||[];});
  loadBar.style.width='52%';
  let stream;
  try{stream=await navigator.mediaDevices.getUserMedia({video:{width:{ideal:1280},height:{ideal:720},facingMode:'user'}});}
  catch(e){statusEl.textContent='❌ Camera access nahi mila.';startBtn.disabled=false;startBtn.textContent='▶ Camera Shuru Karo';loadBar.style.width='0%';return;}
  video.srcObject=stream;
  video.onloadedmetadata=async()=>{
    canvas.width=video.videoWidth;canvas.height=video.videoHeight;
    loadBar.style.width='80%';
    mpCamera=new Camera(video,{onFrame:async()=>{if(running)await mpHands.send({image:video});},width:video.videoWidth,height:video.videoHeight});
    await mpCamera.start();
    loadBar.style.width='100%';setTimeout(()=>loadBar.style.width='0%',600);
    running=true;offScreen.style.display='none';
    startBtn.disabled=false;startBtn.textContent='⏹ Band Karo';startBtn.classList.add('active');
    statusEl.textContent='⚡ READY — Haath laao aur kuch bhi karo!';
    showBanner('GAME START!','#00eeff');
    renderFrame(0);
  };
}

// ══════════════════════════════════════════════════
// START / STOP
// ══════════════════════════════════════════════════
startBtn.addEventListener('click',async()=>{
  if(running){
    running=false;cancelAnimationFrame(animId);
    if(mpCamera){mpCamera.stop();mpCamera=null;}
    if(mpHands){mpHands.close();mpHands=null;}
    if(video.srcObject)video.srcObject.getTracks().forEach(t=>t.stop());
    video.srcObject=null;ctx.clearRect(0,0,canvas.width,canvas.height);
    offScreen.style.display='flex';offMsg.textContent='Camera band hai';
    startBtn.textContent='▶ Camera Shuru Karo';startBtn.classList.remove('active');
    statusEl.textContent='Band ho gaya';statusEl.className='';
    camWrap.className='cam-wrap';handsData=[];bolts=[];particles=[];thrownOrbs=[];targets=[];
    orbCharge=0;orbHoldStart=null;score=0;combo=1;level=1;shieldActive=false;
  } else {
    startBtn.textContent='⏳ Load ho raha hai...';
    await initMP();
  }
});
</script>
